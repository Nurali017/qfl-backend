services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/qfl_db
      - WEB_STATEMENT_TIMEOUT_MS=${WEB_STATEMENT_TIMEOUT_MS:-30000}
      - REDIS_URL=redis://redis:6379/0
      - CURRENT_SEASON_ID=200
      # MinIO
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=qfl-files
      - MINIO_SECURE=false
      - GOOGLE_DRIVE_ENABLED=${GOOGLE_DRIVE_ENABLED:-false}
      - GOOGLE_SERVICE_ACCOUNT_FILE=${GOOGLE_SERVICE_ACCOUNT_FILE:-/app/secrets/google-sa.json}
      - GOOGLE_DRIVE_GOALS_FOLDER_ID=${GOOGLE_DRIVE_GOALS_FOLDER_ID:-}
      - GOAL_VIDEO_AI_FALLBACK_ENABLED=${GOAL_VIDEO_AI_FALLBACK_ENABLED:-true}
      - GOAL_VIDEO_AI_MODEL=${GOAL_VIDEO_AI_MODEL:-claude-haiku-4-5-20251001}
      - GOAL_VIDEO_SYNC_INTERVAL_MINUTES=${GOAL_VIDEO_SYNC_INTERVAL_MINUTES:-5}
      - SOTA_DEAD_SEASON_MIN_404=${SOTA_DEAD_SEASON_MIN_404:-30}
      - SOTA_DEAD_SEASON_404_RATIO=${SOTA_DEAD_SEASON_404_RATIO:-0.8}
      - SOTA_DEAD_SEASON_TTL_SECONDS=${SOTA_DEAD_SEASON_TTL_SECONDS:-3600}
      - DEBUG_SYNC_TIMINGS=${DEBUG_SYNC_TIMINGS:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - .:/app
      - ./secrets:/app/secrets:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15
    command: >-
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c autovacuum_naptime=30s
      -c autovacuum_vacuum_scale_factor=0.05
      -c autovacuum_analyze_scale_factor=0.02
      -c autovacuum_vacuum_cost_delay=2ms
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qfl_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"      # API
      - "9001:9001"      # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build: .
    command: celery -A app.tasks worker -l info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/qfl_db
      - REDIS_URL=redis://redis:6379/0
      - CURRENT_SEASON_ID=200
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=qfl-files
      - MINIO_SECURE=false
      - DATABASE_POOL_CLASS=null
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - TICKET_SEARCH_ENABLED=${TICKET_SEARCH_ENABLED:-false}
      - YOUTUBE_RESERVE_CHANNEL_IDS=${YOUTUBE_RESERVE_CHANNEL_IDS:-}
      - GOOGLE_DRIVE_ENABLED=${GOOGLE_DRIVE_ENABLED:-false}
      - GOOGLE_SERVICE_ACCOUNT_FILE=${GOOGLE_SERVICE_ACCOUNT_FILE:-/app/secrets/google-sa.json}
      - GOOGLE_DRIVE_GOALS_FOLDER_ID=${GOOGLE_DRIVE_GOALS_FOLDER_ID:-}
      - GOAL_VIDEO_AI_FALLBACK_ENABLED=${GOAL_VIDEO_AI_FALLBACK_ENABLED:-true}
      - GOAL_VIDEO_AI_MODEL=${GOAL_VIDEO_AI_MODEL:-claude-haiku-4-5-20251001}
      - GOAL_VIDEO_SYNC_INTERVAL_MINUTES=${GOAL_VIDEO_SYNC_INTERVAL_MINUTES:-5}
      - SOTA_DEAD_SEASON_MIN_404=${SOTA_DEAD_SEASON_MIN_404:-30}
      - SOTA_DEAD_SEASON_404_RATIO=${SOTA_DEAD_SEASON_404_RATIO:-0.8}
      - SOTA_DEAD_SEASON_TTL_SECONDS=${SOTA_DEAD_SEASON_TTL_SECONDS:-3600}
      - DEBUG_SYNC_TIMINGS=${DEBUG_SYNC_TIMINGS:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - .:/app
      - ./secrets:/app/secrets:ro

  celery_beat:
    build: .
    command: celery -A app.tasks beat -l info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/qfl_db
      - REDIS_URL=redis://redis:6379/0
      - CURRENT_SEASON_ID=200
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=qfl-files
      - MINIO_SECURE=false
      - DATABASE_POOL_CLASS=null
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - TICKET_SEARCH_ENABLED=${TICKET_SEARCH_ENABLED:-false}
      - YOUTUBE_RESERVE_CHANNEL_IDS=${YOUTUBE_RESERVE_CHANNEL_IDS:-}
      - GOOGLE_DRIVE_ENABLED=${GOOGLE_DRIVE_ENABLED:-false}
      - GOAL_VIDEO_SYNC_INTERVAL_MINUTES=${GOAL_VIDEO_SYNC_INTERVAL_MINUTES:-5}
      - SOTA_DEAD_SEASON_MIN_404=${SOTA_DEAD_SEASON_MIN_404:-30}
      - SOTA_DEAD_SEASON_404_RATIO=${SOTA_DEAD_SEASON_404_RATIO:-0.8}
      - SOTA_DEAD_SEASON_TTL_SECONDS=${SOTA_DEAD_SEASON_TTL_SECONDS:-3600}
      - DEBUG_SYNC_TIMINGS=${DEBUG_SYNC_TIMINGS:-false}
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
  minio_data:
